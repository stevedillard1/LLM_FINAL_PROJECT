# -----------------------------------------------------------------------------
# Model configuration — uncomment the preset you want to use
# -----------------------------------------------------------------------------

# Gemma-2-4b — best results, needs A10 GPU (24GB VRAM)
model_id:    "google/gemma-2-4b-it"
sae_release: "gemma-scope-2-4b-it-res-all"
sae_hook:    "blocks.17.hook_resid_post"
sae_id:      "layer_17_width_16k_l0_small"

# Gemma-3-1b — newer architecture, fits on most GPUs (8GB+)
